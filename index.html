<title>Studio Girassol</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;background:#1e0033}
:root{
  --rose:#ff4d8f;--rose2:#ff1a6e;--rose3:#ff80b3;
  --violet:#a259ff;--violet2:#7c3aed;--violet4:#f3eeff;
  --deep:#1e0033;--deep2:#2d0050;
  --text:#2d0050;--text2:#7a4a9a;--text3:#bfa0cf;
}
.app{width:100%;height:100%;position:relative;overflow:hidden}
.screen{display:none;position:absolute;inset:0;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* BUTTONS */
.btn{font-family:inherit;cursor:pointer;border:none;transition:transform .15s,opacity .15s;touch-action:manipulation;outline:none;display:inline-flex;align-items:center;justify-content:center}
.btn:active{transform:scale(.95);opacity:.9}
.btn-main{background:linear-gradient(135deg,#ff4d8f,#a259ff);color:#fff;border-radius:50px;padding:14px 36px;font-size:1rem;font-weight:700;box-shadow:0 6px 24px rgba(255,77,143,.4);width:100%;max-width:260px}
.btn-outline{background:rgba(255,255,255,.12);color:#fff;border:2px solid rgba(255,255,255,.35);border-radius:50px;padding:12px 32px;font-size:.95rem;font-weight:600;width:100%;max-width:260px}
.btn-back{background:#fff;border-radius:50%;width:40px;height:40px;font-size:1.1rem;color:#2d0050;font-weight:800;box-shadow:0 2px 10px rgba(255,77,143,.2);flex-shrink:0}
.btn-save{background:linear-gradient(135deg,#f8f8ff,#ffe8f4);border-radius:50px;padding:9px 18px;font-size:.78rem;font-weight:700;color:#7c3aed;box-shadow:0 2px 8px rgba(255,77,143,.2)}
.btn-del{background:linear-gradient(135deg,#ff5252,#c62828);color:#fff;border-radius:50px;padding:11px 22px;font-size:.88rem;font-weight:700}
.btn-ok{background:linear-gradient(135deg,#ff4d8f,#a259ff);color:#fff;border-radius:50px;padding:12px 28px;font-size:.92rem;font-weight:700}
.btn-cancel{background:#f3eeff;color:#7c3aed;border-radius:50px;padding:11px 22px;font-size:.88rem;font-weight:600}
.btn-rst{background:rgba(255,82,82,.15);border:1.5px solid rgba(255,82,82,.4);color:#c62828;border-radius:50%;width:28px;height:28px;font-size:.78rem;position:absolute;top:8px;right:8px;z-index:5;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* HOME */
#scr-home{
  background:radial-gradient(ellipse at 60% 15%,#6b00b8,#2d0050 55%,#1e0033);
  align-items:center;justify-content:center
}
.stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) var(--dl) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(.5)}50%{opacity:.85;transform:scale(1.2)}}
.home-body{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:18px;padding:28px 20px;text-align:center;width:100%;max-width:380px}
.logo-box{background:linear-gradient(135deg,#ff4d8f,#a259ff);border-radius:22px;padding:16px 28px;box-shadow:0 6px 32px rgba(162,89,255,.5)}
.logo-title{font-size:2.2rem;font-weight:900;color:#fff;line-height:1.1}
.logo-sub{font-size:.78rem;color:rgba(255,255,255,.75);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.home-dolls{display:flex;gap:16px;align-items:flex-end;justify-content:center}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.fa{animation:floatUp 3.8s ease-in-out infinite}
.fa2{animation:floatUp 3.8s 1.9s ease-in-out infinite}

/* SELECT */
#scr-select{background:linear-gradient(160deg,#fff5fb,#f5eeff)}
.scr-hdr{display:flex;align-items:center;gap:12px;padding:12px 14px 8px;background:rgba(255,255,255,.97);border-bottom:1px solid rgba(162,89,255,.12);flex-shrink:0}
.scr-hdr h2{font-size:1.1rem;font-weight:700;color:#2d0050;flex:1}
.sel-grid{flex:1;display:flex;align-items:center;justify-content:center;gap:16px;padding:20px 14px;flex-wrap:wrap;overflow-y:auto}
.doll-card{background:#fff;border-radius:24px;padding:18px 12px 14px;box-shadow:0 6px 32px rgba(162,89,255,.15),0 0 0 2.5px rgba(255,128,179,.3);cursor:pointer;transition:transform .2s,box-shadow .2s;min-width:138px;flex:1;max-width:190px;position:relative;text-align:center;border:none}
.doll-card:hover{transform:translateY(-4px);box-shadow:0 14px 40px rgba(162,89,255,.28),0 0 0 2.5px #ff4d8f}
.doll-card:active{transform:scale(.96)}
.doll-prev{min-height:200px;display:flex;align-items:center;justify-content:center}
.doll-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#bfa0cf;margin-top:4px}
.doll-nm{font-size:1rem;color:#2d0050;font-weight:700;margin-top:2px}

/* EDITOR */
#scr-editor{background:linear-gradient(160deg,#fff5fb,#f5eeff)}
.ed-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;background:rgba(255,255,255,.97);box-shadow:0 2px 12px rgba(45,0,80,.07);flex-shrink:0}
.ed-name{font-size:1rem;color:#2d0050;cursor:pointer;flex:1;text-align:center;padding:0 8px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stage{flex:0 0 42%;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(160deg,#fce4ec,#f3e5f5 55%,#ede7f6)}
.stage::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,77,143,.2),transparent 65%);pointer-events:none}
.doll-wrap{position:relative;z-index:2;animation:floatUp 4s ease-in-out infinite}
.tabs{display:flex;background:#fff;border-top:1px solid rgba(162,89,255,.1);border-bottom:1px solid rgba(162,89,255,.1);flex-shrink:0;padding:0 2px}
.tab{flex:1;padding:10px 3px;border:none;background:transparent;font-family:inherit;font-size:.74rem;font-weight:700;color:#7a4a9a;cursor:pointer;transition:all .18s;border-bottom:3px solid transparent}
.tab.on{color:#ff1a6e;border-bottom-color:#ff1a6e;background:rgba(255,77,143,.05)}
.catalog{flex:1;overflow-y:auto;padding:12px;background:linear-gradient(160deg,#fff8fc,#f5eeff);-webkit-overflow-scrolling:touch}
.sec-title{font-size:.7rem;font-weight:700;color:#7a4a9a;margin-bottom:8px;letter-spacing:.4px;text-transform:uppercase}
.swatches{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.sw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;box-shadow:0 2px 7px rgba(0,0,0,.15);transition:transform .15s,border-color .15s;flex-shrink:0}
.sw.on{border-color:#ff1a6e;transform:scale(1.18);box-shadow:0 3px 12px rgba(255,77,143,.45)}
.item-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.item{background:#fff;border-radius:15px;padding:9px 5px 7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;border:2.5px solid transparent;box-shadow:0 2px 10px rgba(0,0,0,.06);transition:transform .15s,border-color .15s}
.item:active{transform:scale(.92)}
.item.on{border-color:#ff1a6e;background:#fff5f9}
.item-img{width:62px;height:62px;display:flex;align-items:center;justify-content:center}
.item-lbl{font-size:.63rem;font-weight:700;color:#7a4a9a;text-align:center;line-height:1.3}

/* GALLERY */
#scr-gallery{background:linear-gradient(160deg,#fff5fb,#f5eeff)}
.gal-grid{flex:1;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:14px;overflow-y:auto}
.gal-card{background:#fff;border-radius:18px;overflow:hidden;cursor:pointer;box-shadow:0 4px 20px rgba(162,89,255,.12);border:1.5px solid rgba(162,89,255,.1);transition:transform .15s}
.gal-card:active{transform:scale(.96)}
.gal-thumb{display:flex;align-items:center;justify-content:center;padding:12px;background:linear-gradient(135deg,#fce4ec,#f3e5f5)}
.gal-info{padding:7px 9px 9px;border-top:1px solid rgba(162,89,255,.1)}
.gal-nm{font-size:.88rem;color:#2d0050;font-weight:700}
.gal-dt{font-size:.6rem;color:#bfa0cf;margin-top:2px;font-weight:500}
.gal-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:36px 20px;text-align:center}
.gal-empty p{font-size:.92rem;color:#7a4a9a;font-weight:500;line-height:1.6}

/* OVERLAYS */
.overlay{position:absolute;inset:0;background:rgba(30,0,51,.62);display:none;align-items:center;justify-content:center;z-index:999;padding:16px;backdrop-filter:blur(5px)}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:24px;padding:26px 20px 20px;width:100%;max-width:300px;box-shadow:0 18px 50px rgba(45,0,80,.35);display:flex;flex-direction:column;gap:16px;align-items:center;animation:popIn .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-size:1.2rem;color:#2d0050;text-align:center;font-weight:700}
.modal input[type=text]{width:100%;border:2px solid #ff80b3;border-radius:12px;padding:11px 14px;font-family:inherit;font-size:.92rem;font-weight:500;color:#2d0050;outline:none;transition:border-color .2s}
.modal input[type=text]:focus{border-color:#ff1a6e}
.modal-row{display:flex;gap:10px;width:100%;justify-content:center;flex-wrap:wrap}
.modal-doll{display:flex;align-items:center;justify-content:center;padding:6px}
.big-icon{font-size:3rem;animation:popIn .5s ease}
.modal p{font-size:.88rem;color:#7a4a9a;font-weight:500;text-align:center;line-height:1.6}
.warn-icon{font-size:2.2rem}
.heart-fx{position:absolute;font-size:1.4rem;z-index:9999;pointer-events:none;animation:flyH 2s ease-out forwards}
@keyframes flyH{0%{transform:translateY(0) scale(.7);opacity:1}100%{transform:translateY(-260px) scale(1.2);opacity:0}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#ff80b3;border-radius:3px}
@media(min-width:480px){.item-grid{grid-template-columns:repeat(4,1fr)}.gal-grid{grid-template-columns:repeat(3,1fr)}}

</head>
<body>
<div class="app" id="app">

  <!-- HOME -->
  <div id="scr-home" class="screen active">
    <div class="stars" id="stars"></div>
    <div class="home-body">
      <div class="logo-box">
        <div class="logo-title">🌻 Studio Girassol</div>
        <div class="logo-sub">Crie • Estilize • Brilhe</div>
      </div>
      <div class="home-dolls">
        <div class="fa" id="hp0"></div>
        <div class="fa2" id="hp1"></div>
      </div>
      <button class="btn btn-main" id="btnPlay">🎀 Jogar Agora</button>
      <button class="btn btn-outline" id="btnGal">📸 Minha Galeria</button>
    </div>
  </div>

  <!-- SELECT -->
  <div id="scr-select" class="screen">
    <div class="scr-hdr">
      <button class="btn btn-back" id="selBack">←</button>
      <h2>✨ Escolha sua Boneca</h2>
    </div>
    <div class="sel-grid">
      <div class="doll-card" id="card0">
        <button class="btn btn-rst" id="rst0" title="Resetar">🗑️</button>
        <div class="doll-prev" id="prev0"></div>
        <div class="doll-lbl">Boneca 1</div>
        <div class="doll-nm" id="cn0">Sem nome</div>
      </div>
      <div class="doll-card" id="card1">
        <button class="btn btn-rst" id="rst1" title="Resetar">🗑️</button>
        <div class="doll-prev" id="prev1"></div>
        <div class="doll-lbl">Boneca 2</div>
        <div class="doll-nm" id="cn1">Sem nome</div>
      </div>
    </div>
  </div>

  <!-- EDITOR -->
  <div id="scr-editor" class="screen">
    <div class="ed-hdr">
      <button class="btn btn-back" id="edBack">←</button>
      <div class="ed-name" id="edName">✏️ Sem nome</div>
      <button class="btn btn-save" id="edSave">💾 Salvar</button>
    </div>
    <div class="stage"><div class="doll-wrap" id="canvas"></div></div>
    <div class="tabs">
      <button class="tab on" id="th" data-tab="hair">💇 Cabelo</button>
      <button class="tab" id="tm" data-tab="makeup">💄 Maquiagem</button>
      <button class="tab" id="to" data-tab="outfit">👗 Roupa</button>
    </div>
    <div class="catalog" id="catalog"></div>
  </div>

  <!-- GALLERY -->
  <div id="scr-gallery" class="screen">
    <div class="scr-hdr">
      <button class="btn btn-back" id="galBack">←</button>
      <h2>📸 Galeria de Bonecas</h2>
    </div>
    <div class="gal-grid" id="gal-grid"></div>
    <div class="gal-empty" id="gal-empty" style="display:none">
      <div id="emp-doll" style="animation:floatUp 3s ease-in-out infinite"></div>
      <p>Sua galeria está vazia!<br>Crie e salve sua primeira boneca.</p>
      <button class="btn btn-main" id="galCreate">Criar Boneca</button>
    </div>
  </div>

  <!-- MODAL: NOME -->
  <div class="overlay" id="ov-name">
    <div class="modal">
      <h3>✏️ Nome da Boneca</h3>
      <input type="text" id="nameInput" placeholder="Ex: Luna, Sofia, Mia..." maxlength="18"/>
      <div class="modal-row">
        <button class="btn btn-cancel" id="nameCnl">Cancelar</button>
        <button class="btn btn-ok" id="nameOk">Salvar ✓</button>
      </div>
    </div>
  </div>

  <!-- MODAL: SALVO -->
  <div class="overlay" id="ov-saved">
    <div class="modal">
      <div class="big-icon">🎉</div>
      <h3>Boneca Salva!</h3>
      <p id="savedMsg"></p>
      <button class="btn btn-ok" id="savedOk">Incrível! 💖</button>
    </div>
  </div>

  <!-- MODAL: DETALHE GALERIA -->
  <div class="overlay" id="ov-detail">
    <div class="modal">
      <div class="modal-doll" id="detDoll"></div>
      <h3 id="detName"></h3>
      <p id="detDate"></p>
      <div class="modal-row">
        <button class="btn btn-del" id="detDel">🗑️ Excluir</button>
        <button class="btn btn-ok" id="detClose">Fechar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: RESET -->
  <div class="overlay" id="ov-reset">
    <div class="modal">
      <div class="warn-icon">⚠️</div>
      <h3>Deletar Criação?</h3>
      <p id="resetMsg"></p>
      <div class="modal-row">
        <button class="btn btn-cancel" id="rstCnl">Cancelar</button>
        <button class="btn btn-del" id="rstOk">🗑️ Deletar</button>
      </div>
    </div>
  </div>

</div><!-- end .app -->

  var SKINS = ['#fde8d0','#f5c6a0','#e8a87c','#c68642','#8d5524','#4a2912'];

  /* ── DOLL SVG ───────────────────────────────────────────── */
  function buildDoll(doll, W, H) {
    W = W || 110; H = H || 220;
    var id  = uid();
    var sk  = doll.skinTone || '#fde8d0';
    var sk2 = shade(sk,-22);
    var sk4 = shade(sk, 18);
    var hair   = HAIRS.filter(function(x){return x.id===doll.hair.id;})[0]   || HAIRS[0];
    var makeup = MAKEUPS.filter(function(x){return x.id===doll.makeup.id;})[0]|| MAKEUPS[0];
    var outfit = OUTFITS.filter(function(x){return x.id===doll.outfit.id;})[0]|| OUTFITS[0];
    var hc = doll.hair.color, mc = doll.makeup.color, oc = doll.outfit.color;

    return '<svg viewBox="0 0 100 215" xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'">'
      +'<defs>'
      +'<radialGradient id="'+id+'fG" cx="38%" cy="30%" r="68%">'
      +'<stop offset="0%" stop-color="'+sk4+'"/>'
      +'<stop offset="45%" stop-color="'+sk+'"/>'
      +'<stop offset="100%" stop-color="'+sk2+'"/>'
      +'</radialGradient>'
      +'<radialGradient id="'+id+'eG" cx="35%" cy="32%" r="65%">'
      +'<stop offset="0%" stop-color="#7a5a50"/>'
      +'<stop offset="100%" stop-color="#1a0a00"/>'
      +'</radialGradient>'
      +'<clipPath id="'+id+'fc"><ellipse cx="50" cy="51" rx="26" ry="30"/></clipPath>'
      +'</defs>'
      +'<ellipse cx="50" cy="212" rx="23" ry="5" fill="rgba(30,0,51,.18)"/>'
      +(doll.outfit.id!=='o3'
        ? '<rect x="33" y="163" width="14" height="48" rx="7" fill="url(#'+id+'fG)"/>'
        + '<rect x="53" y="163" width="14" height="48" rx="7" fill="url(#'+id+'fG)"/>'
        : '')
      + outfit.draw(oc, sk)
      +'<rect x="40" y="80" width="20" height="20" rx="9" fill="url(#'+id+'fG)"/>'
      + hair.back(hc)
      +'<ellipse cx="24" cy="53" rx="5.5" ry="6.5" fill="'+sk+'" stroke="'+sk2+'" stroke-width=".7"/>'
      +'<ellipse cx="76" cy="53" rx="5.5" ry="6.5" fill="'+sk+'" stroke="'+sk2+'" stroke-width=".7"/>'
      +'<ellipse cx="50" cy="51" rx="26.5" ry="30" fill="url(#'+id+'fG)"/>'
      +'<ellipse cx="30" cy="40" rx="5.5" ry="15" fill="'+sk4+'" opacity=".22" transform="rotate(-14,30,40)"/>'
      +'<path d="M31 43 Q38.5 39 45 43" stroke="#3a2518" stroke-width="2" fill="none" stroke-linecap="round"/>'
      +'<path d="M55 43 Q61.5 39 69 43" stroke="#3a2518" stroke-width="2" fill="none" stroke-linecap="round"/>'
      +'<ellipse cx="38" cy="53" rx="9.5" ry="8.5" fill="white"/>'
      +'<ellipse cx="62" cy="53" rx="9.5" ry="8.5" fill="white"/>'
      +'<circle cx="38" cy="54" r="6.2" fill="url(#'+id+'eG)"/>'
      +'<circle cx="62" cy="54" r="6.2" fill="url(#'+id+'eG)"/>'
      +'<circle cx="38" cy="54" r="3.4" fill="#0f0a00"/>'
      +'<circle cx="62" cy="54" r="3.4" fill="#0f0a00"/>'
      +'<circle cx="40" cy="52" r="2.1" fill="white" opacity=".92"/>'
      +'<circle cx="64" cy="52" r="2.1" fill="white" opacity=".92"/>'
      +'<path d="M29.5 50 Q38 45.5 46.5 50" stroke="#1a0a00" stroke-width="2.2" fill="none" stroke-linecap="round"/>'
      +'<path d="M53.5 50 Q62 45.5 70.5 50" stroke="#1a0a00" stroke-width="2.2" fill="none" stroke-linecap="round"/>'
      +'<line x1="31" y1="50" x2="29" y2="46" stroke="#1a0a00" stroke-width="1.3" stroke-linecap="round"/>'
      +'<line x1="42" y1="47.5" x2="43" y2="43.5" stroke="#1a0a00" stroke-width="1.2" stroke-linecap="round"/>'
      +'<line x1="59" y1="47.5" x2="58" y2="43.5" stroke="#1a0a00" stroke-width="1.2" stroke-linecap="round"/>'
      +'<line x1="70.5" y1="50" x2="72" y2="46" stroke="#1a0a00" stroke-width="1.2" stroke-linecap="round"/>'
      +'<g clip-path="url(#'+id+'fc)">'
      + makeup.draw(mc)
      +'</g>'
      + hair.front(hc)
      +'</svg>';
  }

  function miniHair(item, color) {
    var id = uid();
    return '<svg viewBox="14 -2 72 60" xmlns="http://www.w3.org/2000/svg" width="62" height="62">'
      +'<defs><radialGradient id="'+id+'g" cx="40%" cy="35%" r="65%">'
      +'<stop offset="0%" stop-color="#fde8d0"/><stop offset="100%" stop-color="#d4a876"/>'
      +'</radialGradient></defs>'
      + item.back(color)
      +'<ellipse cx="50" cy="36" rx="22" ry="24" fill="url(#'+id+'g)"/>'
      +'<ellipse cx="41" cy="36" rx="7" ry="6.5" fill="white"/>'
      +'<ellipse cx="59" cy="36" rx="7" ry="6.5" fill="white"/>'
      +'<circle cx="41" cy="36.5" r="4" fill="#5c4a8a"/>'
      +'<circle cx="59" cy="36.5" r="4" fill="#5c4a8a"/>'
      +'<circle cx="41" cy="36.5" r="2.2" fill="#0f0a00"/>'
      +'<circle cx="59" cy="36.5" r="2.2" fill="#0f0a00"/>'
      +'<circle cx="42.5" cy="35" r="1.6" fill="white" opacity=".9"/>'
      +'<circle cx="60.5" cy="35" r="1.6" fill="white" opacity=".9"/>'
      +'<path d="M34 33 Q41 29 48 33" stroke="#1a0a00" stroke-width="1.6" fill="none" stroke-linecap="round"/>'
      +'<path d="M52 33 Q59 29 66 33" stroke="#1a0a00" stroke-width="1.6" fill="none" stroke-linecap="round"/>'
      +'<path d="M44 47 Q50 51 56 47" stroke="#d47a62" stroke-width="1.2" fill="none" stroke-linecap="round"/>'
      + item.front(color)
      +'</svg>';
  }

  function miniMakeup(item, color, sk) {
    sk = sk || '#fde8d0';
    var id = uid();
    return '<svg viewBox="20 28 60 54" xmlns="http://www.w3.org/2000/svg" width="62" height="62">'
      +'<defs><radialGradient id="'+id+'g" cx="40%" cy="35%" r="65%">'
      +'<stop offset="0%" stop-color="'+shade(sk,18)+'"/>'
      +'<stop offset="100%" stop-color="'+sk+'"/>'
      +'</radialGradient></defs>'
      +'<ellipse cx="50" cy="52" rx="24" ry="28" fill="url(#'+id+'g)"/>'
      +'<ellipse cx="38" cy="52" rx="8.5" ry="8" fill="white"/>'
      +'<ellipse cx="62" cy="52" rx="8.5" ry="8" fill="white"/>'
      +'<circle cx="38" cy="52.5" r="5.5" fill="#5c4a8a"/>'
      +'<circle cx="62" cy="52.5" r="5.5" fill="#5c4a8a"/>'
      +'<circle cx="38" cy="52.5" r="3.5" fill="#0f0a00"/>'
      +'<circle cx="62" cy="52.5" r="3.5" fill="#0f0a00"/>'
      +'<circle cx="39.5" cy="51" r="2" fill="white" opacity=".92"/>'
      +'<circle cx="63.5" cy="51" r="2" fill="white" opacity=".92"/>'
      +'<path d="M30 49 Q38 44 46 49" stroke="#1a0a00" stroke-width="1.8" fill="none" stroke-linecap="round"/>'
      +'<path d="M54 49 Q62 44 70 49" stroke="#1a0a00" stroke-width="1.8" fill="none" stroke-linecap="round"/>'
      +'<path d="M31 42 Q38 38.5 45 42" stroke="#3a2518" stroke-width="1.6" fill="none" stroke-linecap="round"/>'
      +'<path d="M55 42 Q62 38.5 69 42" stroke="#3a2518" stroke-width="1.6" fill="none" stroke-linecap="round"/>'
      + item.draw(color)
      +'</svg>';
  }

  function miniOutfit(item, color) {
    return '<svg viewBox="14 88 72 118" xmlns="http://www.w3.org/2000/svg" width="62" height="62">'
      + item.draw(color, '#fde8d0')
      +'</svg>';
  }

  function mkDoll() {
    return {
      name: 'Sem nome', skinTone: '#fde8d0',
      hair:   { id: 'h1', color: '#5c2c0a' },
      makeup: { id: 'm0', color: '#f7c5d8' },
      outfit: { id: 'o1', color: '#37474f'  }
    };
  }

  /* ── STATE ──────────────────────────────────────────────── */
  var G = {
    dollIdx: 0, tab: 'hair',
    dolls: [mkDoll(), mkDoll()],
    gallery: [], galIdx: null, rstIdx: null
  };

  function loadState() {
    try {
      var d = JSON.parse(localStorage.getItem('dSG4') || '{}');
      if (d.dolls)   G.dolls   = d.dolls;
      if (d.gallery) G.gallery = d.gallery;
    } catch (e) {}
  }
  function saveState() {
    try { localStorage.setItem('dSG4', JSON.stringify({dolls:G.dolls, gallery:G.gallery})); } catch(e){}
  }

  /* ── NAVIGATION ─────────────────────────────────────────── */
  function goTo(id) {
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    var el = document.getElementById(id);
    if (el) el.classList.add('active');
    if (id === 'scr-select')  renderSelectCards();
    if (id === 'scr-gallery') renderGallery();
  }

  /* ── STARS ──────────────────────────────────────────────── */
  function buildStars() {
    var c = document.getElementById('stars');
    if (!c) return;
    for (var i = 0; i < 55; i++) {
      var s = document.createElement('div');
      s.className = 'star';
      var sz = 1 + Math.random() * 2.5;
      s.style.cssText = 'left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;'
        +'width:'+sz+'px;height:'+sz+'px;'
        +'--d:'+(2+Math.random()*4)+'s;--dl:'+(Math.random()*4)+'s';
      c.appendChild(s);
    }
  }

  /* ── HOME PREVIEWS ──────────────────────────────────────── */
  function renderHomePreviews() {
    var hp0 = document.getElementById('hp0');
    var hp1 = document.getElementById('hp1');
    if (hp0) hp0.innerHTML = buildDoll(G.dolls[0], 86, 172);
    if (hp1) hp1.innerHTML = buildDoll(G.dolls[1], 86, 172);
  }

  /* ── SELECT CARDS ───────────────────────────────────────── */
  function renderSelectCards() {
    for (var i = 0; i < 2; i++) {
      var p = document.getElementById('prev'+i);
      if (p) p.innerHTML = buildDoll(G.dolls[i], 108, 210);
      var n = document.getElementById('cn'+i);
      if (n) n.textContent = G.dolls[i].name;
    }
  }

  /* ── EDITOR ─────────────────────────────────────────────── */
  function D() { return G.dolls[G.dollIdx]; }

  function updateEdName() {
    var e = document.getElementById('edName');
    if (e) e.textContent = '✏️ ' + D().name;
  }

  function renderCanvas() {
    var c = document.getElementById('canvas');
    if (c) c.innerHTML = buildDoll(D(), 172, 315);
  }

  function refresh() {
    renderCanvas();
    renderCatalog();
    renderSelectCards();
    renderHomePreviews();
    saveState();
  }

  function switchTab(t) {
    G.tab = t;
    ['hair','makeup','outfit'].forEach(function(x) {
      var b = document.getElementById('t'+x[0]);
      if (b) b.classList.toggle('on', x === t);
    });
    renderCatalog();
  }

  function renderCatalog() {
    if      (G.tab === 'hair')   renderHairCat();
    else if (G.tab === 'makeup') renderMakeupCat();
    else                          renderOutfitCat();
  }

  function renderHairCat() {
    var d = D();
    var h = '<div class="sec-title">🌸 Tom de Pele</div><div class="swatches">';
    SKINS.forEach(function(t) {
      h += '<div class="sw'+(d.skinTone===t?' on':'')+'" style="background:'+t+'" data-skin="'+t+'"></div>';
    });
    h += '</div><div class="sec-title">💇 Penteado</div><div class="item-grid">';
    HAIRS.forEach(function(item) {
      h += '<div class="item'+(d.hair.id===item.id?' on':'')+'" data-hair="'+item.id+'">'
         + '<div class="item-img">'+miniHair(item, d.hair.color)+'</div>'
         + '<div class="item-lbl">'+item.name+'</div></div>';
    });
    h += '</div>';
    var cur = HAIRS.filter(function(x){return x.id===d.hair.id;})[0];
    if (cur) {
      h += '<div class="sec-title">🎨 Cor do Cabelo</div><div class="swatches">';
      cur.colors.forEach(function(c) {
        h += '<div class="sw'+(d.hair.color===c?' on':'')+'" style="background:'+c+'" data-hcolor="'+c+'"></div>';
      });
      h += '</div>';
    }
    setCatalog(h);
  }

  function renderMakeupCat() {
    var d = D();
    var h = '<div class="sec-title">💄 Maquiagem</div><div class="item-grid">';
    MAKEUPS.forEach(function(item) {
      h += '<div class="item'+(d.makeup.id===item.id?' on':'')+'" data-makeup="'+item.id+'">'
         + '<div class="item-img">'+miniMakeup(item, d.makeup.color, d.skinTone)+'</div>'
         + '<div class="item-lbl">'+item.name+'</div></div>';
    });
    h += '</div>';
    if (d.makeup.id !== 'm0') {
      var cur = MAKEUPS.filter(function(x){return x.id===d.makeup.id;})[0];
      if (cur) {
        h += '<div class="sec-title">🎨 Cor da Maquiagem</div><div class="swatches">';
        cur.colors.forEach(function(c) {
          h += '<div class="sw'+(d.makeup.color===c?' on':'')+'" style="background:'+c+'" data-mcolor="'+c+'"></div>';
        });
        h += '</div>';
      }
    }
    setCatalog(h);
  }

  function renderOutfitCat() {
    var d = D();
    var h = '<div class="sec-title">👗 Roupa</div><div class="item-grid">';
    OUTFITS.forEach(function(item) {
      h += '<div class="item'+(d.outfit.id===item.id?' on':'')+'" data-outfit="'+item.id+'">'
         + '<div class="item-img">'+miniOutfit(item, d.outfit.color)+'</div>'
         + '<div class="item-lbl">'+item.name+'</div></div>';
    });
    h += '</div>';
    var cur = OUTFITS.filter(function(x){return x.id===d.outfit.id;})[0];
    if (cur) {
      h += '<div class="sec-title">🎨 Cor da Roupa</div><div class="swatches">';
      cur.colors.forEach(function(c) {
        h += '<div class="sw'+(d.outfit.color===c?' on':'')+'" style="background:'+c+'" data-ocolor="'+c+'"></div>';
      });
      h += '</div>';
    }
    setCatalog(h);
  }

  function setCatalog(html) {
    var cat = document.getElementById('catalog');
    if (!cat) return;
    cat.innerHTML = html;
    bindCatalog(cat);
  }

  function bindCatalog(cat) {
    cat.querySelectorAll('[data-skin]').forEach(function(el) {
      el.addEventListener('click', function(){ D().skinTone = el.dataset.skin; refresh(); });
    });
    cat.querySelectorAll('[data-hair]').forEach(function(el) {
      el.addEventListener('click', function(){ D().hair.id = el.dataset.hair; refresh(); });
    });
    cat.querySelectorAll('[data-hcolor]').forEach(function(el) {
      el.addEventListener('click', function(){ D().hair.color = el.dataset.hcolor; refresh(); });
    });
    cat.querySelectorAll('[data-makeup]').forEach(function(el) {
      el.addEventListener('click', function(){
        D().makeup.id = el.dataset.makeup;
        var m = MAKEUPS.filter(function(x){return x.id===el.dataset.makeup;})[0];
        if (m) D().makeup.color = m.colors[0];
        refresh();
      });
    });
    cat.querySelectorAll('[data-mcolor]').forEach(function(el) {
      el.addEventListener('click', function(){ D().makeup.color = el.dataset.mcolor; refresh(); });
    });
    cat.querySelectorAll('[data-outfit]').forEach(function(el) {
      el.addEventListener('click', function(){
        D().outfit.id = el.dataset.outfit;
        var o = OUTFITS.filter(function(x){return x.id===el.dataset.outfit;})[0];
        if (o) D().outfit.color = o.colors[0];
        refresh();
      });
    });
    cat.querySelectorAll('[data-ocolor]').forEach(function(el) {
      el.addEventListener('click', function(){ D().outfit.color = el.dataset.ocolor; refresh(); });
    });
  }

  /* ── OVERLAYS ───────────────────────────────────────────── */
  function openOv(id)  { document.getElementById(id).classList.add('open'); }
  function closeOv(id) { document.getElementById(id).classList.remove('open'); }

  /* ── NAME MODAL ─────────────────────────────────────────── */
  function openNameModal() {
    var inp = document.getElementById('nameInput');
    inp.value = D().name === 'Sem nome' ? '' : D().name;
    openOv('ov-name');
    setTimeout(function(){ inp.focus(); }, 150);
  }
  function saveName() {
    var v = document.getElementById('nameInput').value.trim() || 'Sem nome';
    D().name = v;
    updateEdName();
    saveState();
    closeOv('ov-name');
  }

  /* ── SAVE DOLL ──────────────────────────────────────────── */
  function saveDoll() {
    var d = D();
    if (d.name === 'Sem nome') { openNameModal(); return; }
    var dt = new Date().toLocaleDateString('pt-BR', {day:'2-digit',month:'short',year:'numeric'});
    G.gallery.unshift({ doll: JSON.parse(JSON.stringify(d)), savedAt: dt });
    saveState();
    renderHomePreviews();
    var sm = document.getElementById('savedMsg');
    if (sm) sm.textContent = '"' + d.name + '" foi salva na galeria! 💖';
    openOv('ov-saved');
    spawnHearts();
  }

  /* ── GALLERY ────────────────────────────────────────────── */
  function renderGallery() {
    var grid  = document.getElementById('gal-grid');
    var empty = document.getElementById('gal-empty');
    if (!G.gallery.length) {
      grid.style.display  = 'none';
      empty.style.display = 'flex';
      var ed = document.getElementById('emp-doll');
      if (ed) ed.innerHTML = buildDoll(mkDoll(), 86, 172);
      return;
    }
    grid.style.display  = 'grid';
    empty.style.display = 'none';
    grid.innerHTML = G.gallery.map(function(e, i) {
      return '<div class="gal-card" data-gi="'+i+'">'
           + '<div class="gal-thumb">'+buildDoll(e.doll,86,152)+'</div>'
           + '<div class="gal-info"><div class="gal-nm">'+e.doll.name+'</div>'
           + '<div class="gal-dt">'+e.savedAt+'</div></div></div>';
    }).join('');
    grid.querySelectorAll('[data-gi]').forEach(function(el) {
      el.addEventListener('click', function(){ openDetail(parseInt(el.dataset.gi)); });
    });
  }

  function openDetail(i) {
    G.galIdx = i;
    var e = G.gallery[i];
    var dd = document.getElementById('detDoll');
    if (dd) dd.innerHTML = buildDoll(e.doll, 112, 212);
    var dn = document.getElementById('detName');
    if (dn) dn.textContent = e.doll.name;
    var dd2 = document.getElementById('detDate');
    if (dd2) dd2.textContent = 'Salva em: ' + e.savedAt;
    openOv('ov-detail');
  }

  function deleteDoll() {
    if (G.galIdx !== null) {
      G.gallery.splice(G.galIdx, 1);
      saveState();
      closeOv('ov-detail');
      renderGallery();
    }
  }

  /* ── HEARTS ─────────────────────────────────────────────── */
  function spawnHearts() {
    var app  = document.getElementById('app');
    var opts = ['💖','💕','💗','🌸','✨','⭐','🎀'];
    for (var i = 0; i < 12; i++) {
      (function(delay) {
        setTimeout(function() {
          var h = document.createElement('div');
          h.className = 'heart-fx';
          h.textContent = opts[~~(Math.random() * opts.length)];
          h.style.left   = (15 + Math.random() * 70) + '%';
          h.style.bottom = '90px';
          app.appendChild(h);
          setTimeout(function(){ h.remove(); }, 2100);
        }, delay);
      })(i * 90);
    }
  }

  /* ── INIT ───────────────────────────────────────────────── */
  loadState();
  buildStars();
  renderHomePreviews();
  renderSelectCards();
  renderGallery();

  /* ── BIND ALL BUTTONS ───────────────────────────────────── */
  function on(id, ev, fn) {
    var el = document.getElementById(id);
    if (el) el.addEventListener(ev, fn);
  }

  on('btnPlay',  'click', function(){ goTo('scr-select'); });
  on('btnGal',   'click', function(){ goTo('scr-gallery'); });
  on('selBack',  'click', function(){ goTo('scr-home'); });
  on('galBack',  'click', function(){ goTo('scr-home'); });
  on('galCreate','click', function(){ goTo('scr-select'); });

  on('card0', 'click', function(){
    G.dollIdx = 0; G.tab = 'hair';
    updateEdName(); renderCanvas(); switchTab('hair');
    goTo('scr-editor');
  });
  on('card1', 'click', function(){
    G.dollIdx = 1; G.tab = 'hair';
    updateEdName(); renderCanvas(); switchTab('hair');
    goTo('scr-editor');
  });

  on('rst0', 'click', function(e){
    e.stopPropagation(); G.rstIdx = 0;
    var rm = document.getElementById('resetMsg');
    if (rm) rm.textContent = 'Apagar a criação da Boneca 1 ("'+G.dolls[0].name+'")? Isso não pode ser desfeito.';
    openOv('ov-reset');
  });
  on('rst1', 'click', function(e){
    e.stopPropagation(); G.rstIdx = 1;
    var rm = document.getElementById('resetMsg');
    if (rm) rm.textContent = 'Apagar a criação da Boneca 2 ("'+G.dolls[1].name+'")? Isso não pode ser desfeito.';
    openOv('ov-reset');
  });

  on('edBack',  'click', function(){ goTo('scr-select'); });
  on('edName',  'click', function(){ openNameModal(); });
  on('edSave',  'click', function(){ saveDoll(); });

  on('th', 'click', function(){ switchTab('hair'); });
  on('tm', 'click', function(){ switchTab('makeup'); });
  on('to', 'click', function(){ switchTab('outfit'); });

  on('nameCnl', 'click', function(){ closeOv('ov-name'); });
  on('nameOk',  'click', function(){ saveName(); });
  on('savedOk', 'click', function(){ closeOv('ov-saved'); });
  on('detDel',  'click', function(){ deleteDoll(); });
  on('detClose','click', function(){ closeOv('ov-detail'); });
  on('rstCnl',  'click', function(){ closeOv('ov-reset'); });
  on('rstOk',   'click', function(){
    if (G.rstIdx !== null) {
      G.dolls[G.rstIdx] = mkDoll();
      saveState();
      renderSelectCards();
      renderHomePreviews();
      closeOv('ov-reset');
      G.rstIdx = null;
    }
  });

  on('nameInput','keydown', function(e){ if (e.key === 'Enter') saveName(); });

  ['ov-name','ov-saved','ov-detail','ov-reset'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('click', function(e){ if (e.target === el) closeOv(id); });
  });

})();
</script>
</body>
</html>
